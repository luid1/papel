<!-- ═══════════════════════════════════════════════════════════
     LUMIN — Papelão v2 — Fragmentos HTML
     Adicione estes blocos ao seu index.html nos locais indicados.
═══════════════════════════════════════════════════════════ -->


<!-- ─────────────────────────────────────────────────────────
     1. TABS — Substitua as tabs existentes por estas
        (acrescenta a aba "Configurações" com ícone ⚙️)
───────────────────────────────────────────────────────────── -->
<div class="pap-tabs" style="
  display: flex;
  gap: 6px;
  background: rgba(255,255,255,.04);
  border-radius: 16px;
  padding: 6px;
  margin-bottom: 24px;
">
  <button class="pap-tab-btn active" data-pap-tab="apagar" style="
    flex: 1; padding: 12px 8px; border-radius: 12px;
    border: none; cursor: pointer; font-weight: 700; font-size: 14px;
    background: var(--bg2); color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,.3); transition: .2s;
  ">
    📦 A Pagar
  </button>
  <button class="pap-tab-btn" data-pap-tab="dashboard" style="
    flex: 1; padding: 12px 8px; border-radius: 12px;
    border: none; cursor: pointer; font-weight: 700; font-size: 14px;
    background: transparent; color: var(--muted); transition: .2s;
  ">
    📊 Dashboard
  </button>
  <!-- NOVO: Aba de Configurações -->
  <button class="pap-tab-btn" data-pap-tab="config" style="
    flex: 0 0 auto; padding: 12px 16px; border-radius: 12px;
    border: none; cursor: pointer; font-weight: 700; font-size: 14px;
    background: transparent; color: var(--muted); transition: .2s;
  " title="Configurações do módulo">
    ⚙️
  </button>
</div>

<!-- Painel A Pagar -->
<div id="pap-apagar-panel" style="display: block;">
  <!-- Aviso quando módulo está desativado (controlado pelo JS) -->
  <div id="pap-disabled-notice" style="display: none;
    text-align: center; padding: 60px 20px; color: var(--muted);
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🔒</div>
    <div style="font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px;">
      Módulo Desativado
    </div>
    <div style="font-size: 14px;">
      Ative o módulo na aba <strong>⚙️ Configurações</strong>.
    </div>
  </div>
  <div id="pap-apagar-list"></div>
</div>

<!-- Painel Dashboard -->
<div id="pap-dash-panel" style="display: none;">
  <!-- Seu HTML de dashboard existente aqui -->
  <div id="pap-dash-groups"></div>
</div>

<!-- NOVO: Painel Configurações (conteúdo injetado pelo JS) -->
<div id="pap-config-panel" style="display: none;">
  <div id="pap-settings-panel"></div>
</div>


<!-- ─────────────────────────────────────────────────────────
     2. MODAL DE PESAGEM — Substitua o modal existente por este
        Acrescenta: preço padrão visível + campo para preço custom
───────────────────────────────────────────────────────────── -->
<div id="pap-modal-add" style="
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 20px;
">
  <!-- Quando activo, o JS adiciona a classe 'active' que muda display para flex -->

  <div class="glass" style="
    width: 100%; max-width: 480px; border-radius: 24px;
    padding: 32px; border: 1px solid rgba(255,255,255,.08);
    position: relative;
  ">
    <!-- Fechar -->
    <button id="pap-modal-close" style="
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,.08); border: none; border-radius: 10px;
      width: 36px; height: 36px; cursor: pointer; font-size: 18px;
      color: var(--muted); display: grid; place-items: center;
    ">✕</button>

    <div style="font-size: 22px; font-weight: 800; margin-bottom: 24px;">
      📦 Nova Pesagem
    </div>

    <!-- Fornecedor -->
    <div style="margin-bottom: 18px;">
      <label style="display: block; font-size: 12px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
        Fornecedor
      </label>
      <input
        id="pap-mercado"
        type="text"
        list="pap-mercados-list"
        placeholder="Nome do mercado / avulso"
        style="
          width: 100%; padding: 14px 16px; border-radius: 12px;
          background: var(--bg2); border: 1.5px solid var(--border);
          color: var(--text); font-size: 16px; outline: none; transition: .2s;
          box-sizing: border-box;
        "
      >
      <datalist id="pap-mercados-list"></datalist>
    </div>

    <!-- KG + Data (lado a lado) -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px;">
      <div>
        <label style="display: block; font-size: 12px; color: var(--muted);
          text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
          Peso (KG)
        </label>
        <input
          id="pap-kg"
          type="number"
          min="0.1"
          step="0.1"
          placeholder="0,00"
          style="
            width: 100%; padding: 14px 16px; border-radius: 12px;
            background: var(--bg2); border: 1.5px solid var(--border);
            color: var(--text); font-size: 16px; outline: none; transition: .2s;
            box-sizing: border-box;
          "
        >
      </div>
      <div>
        <label style="display: block; font-size: 12px; color: var(--muted);
          text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
          Data
        </label>
        <input
          id="pap-data"
          type="date"
          style="
            width: 100%; padding: 14px 16px; border-radius: 12px;
            background: var(--bg2); border: 1.5px solid var(--border);
            color: var(--text); font-size: 16px; outline: none; transition: .2s;
            box-sizing: border-box;
          "
        >
      </div>
    </div>

    <!-- NOVO: Preço por KG customizado -->
    <div style="
      padding: 16px 18px; border-radius: 14px;
      background: rgba(255,179,71,.05); border: 1px solid rgba(255,179,71,.15);
      margin-bottom: 20px;
    ">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
        <div>
          <div style="font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px;">
            Preço por KG
          </div>
          <div style="font-size: 12px; color: var(--muted);">
            Padrão: <span id="pap-modal-price-label" style="color: var(--warning);">R$ 0,40/kg</span>
            — deixe vazio para usar o padrão
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 6px;">
          <span style="color: var(--muted); font-size: 13px;">R$</span>
          <input
            id="pap-preco-custom"
            type="number"
            min="0.01"
            step="0.01"
            placeholder="Opcional"
            style="
              width: 100px; padding: 10px 12px; border-radius: 10px;
              background: var(--bg2); border: 1.5px solid rgba(255,179,71,.3);
              color: var(--warning); font-family: 'DM Mono', monospace;
              font-size: 15px; font-weight: 700; text-align: center;
              outline: none; transition: .2s; box-sizing: border-box;
            "
          >
          <span style="color: var(--muted); font-size: 13px;">/kg</span>
        </div>
      </div>
    </div>

    <!-- Total Preview -->
    <div style="
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-radius: 14px; margin-bottom: 22px;
      background: rgba(0,229,160,.05); border: 1px solid rgba(0,229,160,.15);
    ">
      <span style="font-size: 15px; color: var(--muted); font-weight: 600;">
        Total a Pagar:
      </span>
      <span id="pap-total-preview" style="
        font-family: 'DM Mono', monospace; font-size: 26px;
        font-weight: 700; color: var(--success);
      ">
        R$ 0,00
      </span>
    </div>

    <!-- Registrar -->
    <button id="btn-registrar-pap" style="
      width: 100%; padding: 18px; border-radius: 14px; border: none;
      cursor: pointer; font-weight: 800; font-size: 16px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #000; box-shadow: 0 4px 20px rgba(0,212,255,.3); transition: .2s;
    ">
      ✓ Registrar Pesagem
    </button>
  </div>
</div>


<!-- ─────────────────────────────────────────────────────────
     3. CSS EXTRA — Cole no <style> do seu index.html
        (ou num arquivo CSS separado)
───────────────────────────────────────────────────────────── -->
<style>
/* Modal visível quando tem classe 'active' */
#pap-modal-add.active {
  display: flex !important;
}

/* Focus nos inputs do modal */
#pap-modal-add input:focus {
  border-color: var(--accent, #00d4ff) !important;
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
}

#pap-preco-custom:focus {
  border-color: var(--warning, #ffb347) !important;
  box-shadow: 0 0 0 3px rgba(255, 179, 71, 0.1);
}

/* Hover nos botões de tab */
.pap-tab-btn:hover:not(.active) {
  background: rgba(255,255,255,.06) !important;
  color: var(--text) !important;
}

/* Hover nos cards "A Pagar" */
.ob-item {
  display: flex;
  align-items: center;
  transition: transform .15s, box-shadow .15s;
}
.ob-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.25);
}
</style>
