<div class="auth-container">
  <div class="auth-card">
    <header>
      <span class="brand">Lumin — Agency</span>
      <h1>Criar Novo Acesso</h1>
      <p>Configure suas credenciais de administrador pessoal.</p>
    </header>

    <form id="register-form">
      <div class="input-grid">
        <div class="field">
          <label>Nome Completo</label>
          <input type="text" id="new-name" placeholder="Ex: Luid Admin" required>
        </div>
        
        <div class="field">
          <label>ID da Empresa (Slug)</label>
          <input type="text" id="new-company-id" placeholder="ex: pessoal-luid" required>
        </div>
      </div>

      <div class="field">
        <label>E-mail de Acesso</label>
        <input type="email" id="new-email" placeholder="seu@email.com" required>
      </div>

      <div class="field">
        <label>Senha de Segurança</label>
        <input type="password" id="new-password" placeholder="••••••••" required>
      </div>

      <button type="submit" id="btn-create">
        Criar Conta e Configurar Dashboard
      </button>
    </form>

    <div id="status-message"></div>
  </div>
</div>

<style>
  /* Design "Bem Maior" e Minimalista */
  .auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #050505;
    padding: 20px;
  }

  .auth-card {
    background: #0f1115;
    border: 1px solid #1f2229;
    padding: 48px; /* Espaçamento maior */
    border-radius: 24px;
    width: 100%;
    max-width: 520px; /* Card mais largo */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
  p { color: #888; font-size: 15px; margin-bottom: 32px; }

  .field { margin-bottom: 20px; }
  label { display: block; color: #aaa; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }

  input {
    width: 100%;
    background: #16191f;
    border: 1px solid #2a2e37;
    padding: 16px; /* Inputs maiores para mobile */
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    transition: 0.3s;
  }

  input:focus { border-color: #00d4ff; outline: none; box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1); }

  button {
    width: 100%;
    padding: 18px;
    background: #00d4ff;
    color: #000;
    font-weight: 700;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
  }

  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Responsividade Mobile */
  @media (max-width: 480px) {
    .auth-card { padding: 32px 24px; }
    .input-grid { grid-template-columns: 1fr; }
    h1 { font-size: 24px; }
  }
</style>

<script type="module">
  // A lógica de integração com seu Firebase
  import { auth, db } from "./firebase-config.js"; 
  import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById('register-form');
  
  form.onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-create');
    btn.innerText = "Configurando...";
    btn.disabled = true;

    const email = document.getElementById('new-email').value;
    const password = document.getElementById('new-password').value;
    const name = document.getElementById('new-name').value;
    const companyId = document.getElementById('new-company-id').value;

    try {
      // 1. Criar no Auth
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      
      // 2. Criar Documento do Usuário (Logica igual a da Ana/Wallace)
      await setDoc(doc(db, "users", cred.user.uid), {
        displayName: name,
        email: email,
        companyId: companyId,
        role: "admin", // Você como admin pessoal
        active: true,
        createdAt: Date.now(),
        username: name.toLowerCase().replace(/\s/g, '')
      });

      // 3. Criar a Empresa para este usuário
      await setDoc(doc(db, "companies", companyId), {
        name: `Empresa de ${name}`,
        themeColor: "#00d4ff",
        active: true,
        createdAt: Date.now()
      });

      alert("Acesso Pessoal criado com sucesso! Redirecionando...");
      window.location.href = "/dashboard"; // Ajuste para sua rota

    } catch (error) {
      alert("Erro: " + error.message);
      btn.innerText = "Tentar Novamente";
      btn.disabled = false;
    }
  };
</script>
