body{font-family:'Inter',sans-serif;font-size:1.05rem;line-height:1.55;background:var(--bg);

.glass-card{background:var(--glass);border:1px solid var(--border);

/* ---- BOTOES ---- */
.btn-giant{width:100%;min-height:90px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--bg);font-family:'Montserrat',sans-serif;font-size:1.45rem;font-weight:900;

  padding:0 28px;user-select:none}
.btn-giant:active{transform:scale(.965);opacity:.88;box-shadow:0 2px 12px rgba(0,212,255,.15)}

  transition:background .15s,transform .1s;user-select:none}
.btn-sec:active{background:rgba(255,255,255,.1);transform:scale(.98)}

/* ---- CONTADORES ---- */

.counter-btn{min-height:88px;border-radius:18px;display:flex;align-items:center;
  justify-content:center;font-size:3rem;font-weight:900;
  transition:transform .08s,background .12s,opacity .12s;user-select:none;-webkit-user-select:none}
.counter-btn:active{transform:scale(.93)}
.counter-minus{background:rgba(255,255,255,.07);border:1.5px solid var(--border);color:var(--text)}
.counter-minus:active{background:rgba(255,255,255,.14)}
.counter-plus{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);
  box-shadow:0 4px 22px rgba(0,212,255,.3)}

  color:var(--text);text-align:center;min-width:88px;line-height:1}

.input-field{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);

.step-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.1);

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);

/* ─── Utilitário de foto ─── */
function tirarFoto() {
  return new Promise(resolve => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.capture = 'environment';
    inp.style.display = 'none';
    document.body.appendChild(inp);

    let done = false;
    const finish = (val) => {
      if (done) return; done = true;
      try { document.body.removeChild(inp); } catch(_) {}
      resolve(val);
    };

    inp.onchange = () => {
      const file = inp.files[0];
      if (!file) { finish(null); return; }
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const maxW = 900, maxH = 900;
          let { width: w, height: h } = img;
          if (w > maxW || h > maxH) {
            const r = Math.min(maxW / w, maxH / h);
            w = Math.round(w * r); h = Math.round(h * r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          finish(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = () => finish(null);
        img.src = e.target.result;
      };
      reader.onerror = () => finish(null);
      reader.readAsDataURL(file);
    };

    // fallback: se o usuário fechar sem escolher
    window.addEventListener('focus', function onFocus() {
      window.removeEventListener('focus', onFocus);
      setTimeout(() => { if (!done) finish(null); }, 800);
    });

    inp.click();
  });
}

function renderFotoBlock(fotoKey, labelText) {
  const fotoData = window._S && window._S.fotos && window._S.fotos[fotoKey];
  if (fotoData) {
    return `<div id="foto-block-${fotoKey}" style="margin-top:14px;">
      <div style="font-size:.75rem;font-weight:800;text-transform:uppercase;
        letter-spacing:.14em;color:rgba(0,229,160,.7);margin-bottom:8px;">
        ✓ ${labelText}
      </div>
      <div style="position:relative;display:inline-block;width:100%;max-width:340px;">
        <img src="${fotoData}" style="width:100%;max-width:340px;border-radius:14px;
          border:2px solid rgba(0,229,160,.4);display:block;" />
        <button onclick="window.trocaFoto('${fotoKey}','${encodeURIComponent(labelText)}')"
          style="position:absolute;bottom:10px;right:10px;
          padding:8px 14px;border-radius:10px;font-size:.78rem;font-weight:700;
          background:rgba(5,13,18,.85);border:1px solid rgba(255,255,255,.25);
          color:var(--text);backdrop-filter:blur(8px);cursor:pointer;">
          📷 Trocar
        </button>
      </div>
    </div>`;
  }
  return `<div id="foto-block-${fotoKey}" style="margin-top:14px;">
    <button onclick="window.tirarFotoUI('${fotoKey}','${encodeURIComponent(labelText)}')"
      style="width:100%;min-height:76px;border-radius:16px;
      border:2px dashed rgba(0,212,255,.35);background:rgba(0,212,255,.03);
      color:var(--accent);font-size:.95rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:background .15s;cursor:pointer;">
      📷 <span>Tirar foto <span style="font-weight:400;opacity:.6;">(opcional)</span></span>
    </button>
  </div>`;
}

window.tirarFotoUI = async function(key, encodedLabel) {
  const label = decodeURIComponent(encodedLabel);
  const btn = event && event.target ? event.target.closest('button') : null;
  if (btn) { btn.disabled = true; btn.style.opacity = '.5'; btn.textContent = '⏳ Abrindo câmera...'; }
  const data = await tirarFoto();
  if (data) {
    window._S.fotos[key] = data;
    toast('📸 Foto salva!');
    // Re-render somente o bloco da foto
    const blk = document.getElementById('foto-block-' + key);
    if (blk) blk.outerHTML = renderFotoBlock(key, label);
  } else {
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.innerHTML = '📷 <span>Tirar foto <span style="font-weight:400;opacity:.6;">(opcional)</span></span>'; }
  }
};

window.trocaFoto = async function(key, encodedLabel) {
  const label = decodeURIComponent(encodedLabel);
  const data = await tirarFoto();
  if (data) {
    window._S.fotos[key] = data;
    toast('📸 Foto atualizada!');
    const blk = document.getElementById('foto-block-' + key);
    if (blk) blk.outerHTML = renderFotoBlock(key, label);
  }
};

function initDriver(name) {
  const S = {
    step: 'choose',
    mode: null,         // 'cd' | 'client'
    truckBlack: 0, truckWhite: 0,
    clientName: '',
    delBlack: 0, delWhite: 0,
    colBlack: 0, colWhite: 0,
    transactions: [],

    fotos: {},

  /* Carrega saldo atual do caminhão */
  db.collection('ll_drivers').doc(name).get().then(doc => {
    if (doc.exists) {
      S.truckBlack = nn(doc.data().truckBlack);
      S.truckWhite = nn(doc.data().truckWhite);

    render();

  /* ══ TELA INICIAL: ESCOLHA DO MODO ══ */

        <div style="background:linear-gradient(135deg,rgba(0,212,255,.14),rgba(0,143,181,.08));
          border:2px solid rgba(0,212,255,.35);border-radius:24px;padding:32px 28px;
          transition:transform .12s,box-shadow .12s;active:transform:scale(.98);">
          <div style="font-size:3.5rem;margin-bottom:16px;line-height:1;">🏭</div>

      </div>

      <button onclick="confirmDeparture()" class="btn-giant">
        ${ico('<polyline points="20 6 9 17 4 12"/>',24)} Confirmar Retirada do CD
      </button>
    </div>`;
  }

  /* ══ LANÇAMENTO NO CLIENTE ══ */
  function vClient() {
    $('app').innerHTML = `<div id="driver-wrap" class="fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <button onclick="window.voltarEscolha()"
          style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;
          background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
          font-size:.85rem;font-weight:700;color:rgba(228,240,246,.6);cursor:pointer;">
          ← Início
        </button>
        <div class="step-dot-row">${dots(1,2)}</div>
      </div>

      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
        <div style="width:52px;height:52px;border-radius:14px;background:rgba(0,229,160,.1);
          border:1.5px solid rgba(0,229,160,.25);display:flex;align-items:center;
          justify-content:center;font-size:1.8rem;flex-shrink:0;">🚚</div>
        <div>
          <div style="font-family:'Montserrat',sans-serif;font-size:1.45rem;font-weight:900;line-height:1.1;">
            Lançamento no Cliente
          </div>
        </div>
      </div>

      ${truckBar()}

      <div class="glass-card" style="padding:22px;margin-bottom:16px;">
        <div class="label-section" style="margin-bottom:12px;">Nome do Cliente</div>
        <input id="clientInput" type="text" class="input-field"
          placeholder="Ex: Padaria do Joao"
          value="${S.clientName}" oninput="S.clientName=this.value"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>

      <div class="glass-card" style="padding:28px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
          <div class="icon-box" style="background:rgba(0,212,255,.12);">📤</div>
          <div>
            <div style="font-family:'Montserrat',sans-serif;font-size:1.15rem;font-weight:800;">ENTREGOU</div>
            <div style="font-size:.78rem;color:var(--muted);">Saiu do caminhão para o cliente</div>
          </div>
        </div>
        ${cBlock('Pretas', 'delBlack', 'c-dB')}
        <div class="sep"></div>
        ${cBlock('Brancas', 'delWhite', 'c-dW')}
        <div class="sep" style="margin-top:4px;"></div>
        ${renderFotoBlock('client_entrega', 'Foto da entrega')}
      </div>

      <div class="glass-card" style="padding:28px;margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
          <div class="icon-box" style="background:rgba(0,229,160,.1);">📥</div>
          <div>
            <div style="font-family:'Montserrat',sans-serif;font-size:1.15rem;font-weight:800;">COLETOU</div>
            <div style="font-size:.78rem;color:var(--muted);">Entrou no caminhão</div>
          </div>
        </div>
        ${cBlock('Pretas', 'colBlack', 'c-cB')}
        <div class="sep"></div>
        ${cBlock('Brancas', 'colWhite', 'c-cW')}
        <div class="sep" style="margin-top:4px;"></div>
        ${renderFotoBlock('client_coleta', 'Foto da coleta')}
      </div>

      <button id="regBtn" onclick="registerClient()" class="btn-giant" style="margin-bottom:14px;">
        ${ico('<polyline points="20 6 9 17 4 12"/>',24)} Registrar Cliente
      </button>
      <button onclick="goSummary()" class="btn-sec">Ver Resumo e Finalizar</button>
    </div>`;
  }

  /* ══ RESUMO ══ */
  function vSummary() {
    const txHtml = S.transactions.length ? S.transactions.map(tx => `
      <div class="tx-item">
        <div class="tx-client">${tx.clientName}</div>
        <div class="tx-chips">
          ${tx.delBlack ? `<span class="tx-chip del">Pretas entregues: ${tx.delBlack}</span>` : ''}
          ${tx.delWhite ? `<span class="tx-chip del">Brancas entregues: ${tx.delWhite}</span>` : ''}
          ${tx.colBlack ? `<span class="tx-chip col">Pretas coletadas: ${tx.colBlack}</span>` : ''}
          ${tx.colWhite ? `<span class="tx-chip col">Brancas coletadas: ${tx.colWhite}</span>` : ''}
          ${tx.temFoto  ? `<span class="tx-chip" style="border-color:rgba(255,179,71,.3);color:var(--warning);">📷 Foto</span>` : ''}
        </div>
      </div>`).join('') : '<p class="empty">Nenhum cliente lançado ainda.</p>';

    $('app').innerHTML = `<div id="driver-wrap" class="fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <span class="wordmark">Lumin Log</span>
        <div class="step-dot-row">${dots(2,2)}</div>
      </div>
      <div class="step-badge" style="margin-bottom:18px;">Resumo</div>
      <h2 style="font-family:'Montserrat',sans-serif;font-size:1.85rem;font-weight:900;
        color:var(--text);margin-bottom:24px;line-height:1.1;">Resumo do Dia</h2>
      <div class="glass-card" style="padding:28px;margin-bottom:16px;">
        <div class="label-section" style="margin-bottom:18px;">No Caminhão Agora</div>
        <div style="display:flex;gap:36px;">
          <div><div class="big-num">${S.truckBlack}</div><div class="big-num-label">Pretas</div></div>
          <div><div class="big-num">${S.truckWhite}</div><div class="big-num-label">Brancas</div></div>
          <div><div class="big-num" style="color:var(--accent);">${S.truckBlack+S.truckWhite}</div><div class="big-num-label">Total</div></div>
        </div>
      </div>
      <div class="glass-card" style="padding:22px;margin-bottom:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div class="label-section">${S.transactions.length} cliente${S.transactions.length!==1?'s':''} lançado${S.transactions.length!==1?'s':''}</div>
          <button onclick="backToClient()" style="font-size:.78rem;font-weight:700;color:var(--accent);
            padding:7px 14px;border:1px solid rgba(0,212,255,.2);border-radius:8px;
            background:rgba(0,212,255,.06);cursor:pointer;">+ Novo Cliente</button>
        </div>
        <div style="max-height:300px;overflow-y:auto;">${txHtml}</div>
      </div>
      <button id="finalBtn" onclick="finalize()" class="btn-giant" style="margin-bottom:14px;">
        Finalizar o Dia
      </button>
      <button onclick="backToClient()" class="btn-sec">Voltar e Adicionar Mais</button>
    </div>`;
  }

  /* ══ DONE ══ */
  function vDone() {
    $('app').innerHTML = `<div id="driver-wrap" class="fade-in"
      style="display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:85svh;text-align:center;padding:40px 20px;">
      <div style="font-size:88px;line-height:1;margin-bottom:24px;
        filter:drop-shadow(0 0 30px rgba(0,229,160,.4));">✅</div>
      <h1 style="font-family:'Montserrat',sans-serif;font-size:2.4rem;font-weight:900;
        color:var(--text);margin-bottom:12px;line-height:1.1;">Dia Finalizado!</h1>
      <p style="color:var(--muted);font-size:1.2rem;margin-bottom:6px;">Tudo salvo com sucesso.</p>
      <p style="color:var(--muted);font-size:1.05rem;margin-bottom:48px;">
        Obrigado, <span style="color:var(--text);font-weight:700;">${name}</span>. Bom descanso!
      </p>
      <button onclick="newDay()" class="btn-giant" style="max-width:320px;">Novo Lançamento</button>
    </div>`;
  }

  /* ── AÇÕES ── */
  window.S = S;

  window.adj = function(key, delta, elId) {
    S[key] = Math.max(0, S[key] + delta);
    const el = $(elId); if (el) el.textContent = S[key];
  };

  window.escolherModo = function(mode) {
    S.mode = mode;
    S.step = mode === 'cd' ? 'departure' : 'client';
    render();
  };

  window.voltarEscolha = function() {
    S.step = 'choose';
    render();
  };

  window.confirmDeparture = async function() {
    if (S.saving) return; S.saving = true;
    try {
      const batch = db.batch();
      batch.set(db.collection('ll_drivers').doc(name),
        { name, truckBlack: S.truckBlack, truckWhite: S.truckWhite, lastUpdated: TS() },
        { merge: true });

      const eventData = {
        type: 'cd_departure', driverName: name,
        truckBlack: S.truckBlack, truckWhite: S.truckWhite, timestamp: TS()
      };
      if (S.fotos.cd_saida) eventData.fotoUrl = S.fotos.cd_saida;
      batch.set(db.collection('ll_events').doc(), eventData);

      await batch.commit();
      // Após retirada no CD, vai para lançamento de cliente
      S.step = 'client'; S.mode = 'client';
      render();
    } catch(e) { toast('Erro ao salvar. Verifique a conexão.'); }
    finally { S.saving = false; }
  };

  window.registerClient = async function() {
    const inputEl = $('clientInput');
    const cn = (inputEl ? inputEl.value : S.clientName).trim().toUpperCase();
    if (!cn) { toast('Digite o nome do cliente!'); return; }
    const { delBlack, delWhite, colBlack, colWhite } = S;
    if (!delBlack && !delWhite && !colBlack && !colWhite) { toast('Informe ao menos uma caixa!'); return; }
    if (S.saving) return; S.saving = true;

    const btn = $('regBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

    try {
      const today = new Date().toISOString().split('T')[0];
      const newTB = Math.max(0, S.truckBlack - delBlack + colBlack);
      const newTW = Math.max(0, S.truckWhite - delWhite + colWhite);

      const cRef  = db.collection('ll_clients').doc(cn);
      const cSnap = await cRef.get();
      const cur   = cSnap.exists ? cSnap.data() : { balanceBlack: 0, balanceWhite: 0 };

      const batch = db.batch();

      batch.update(db.collection('ll_drivers').doc(name), {
        truckBlack: newTB, truckWhite: newTW, lastUpdated: TS()
      });

      batch.set(cRef, {
        name: cn,
        balanceBlack: Math.max(0, nn(cur.balanceBlack) + delBlack - colBlack),
        balanceWhite: Math.max(0, nn(cur.balanceWhite) + delWhite - colWhite),
        lastUpdated: TS()
      }, { merge: true });

      const eventData = {
        type: 'client_transaction', driverName: name, clientName: cn,
        delBlack, delWhite, colBlack, colWhite,
        truckBefore: { black: S.truckBlack, white: S.truckWhite },
        truckAfter:  { black: newTB, white: newTW },
        timestamp: TS()
      };
      if (S.fotos.client_entrega) eventData.fotoEntrega = S.fotos.client_entrega;
      if (S.fotos.client_coleta)  eventData.fotoColeta  = S.fotos.client_coleta;
      batch.set(db.collection('ll_events').doc(), eventData);

      if (delBlack > 0) batch.set(db.collection('controle_caixas').doc(), {
        tipo: 'SAIDA', data: today, cliente: cn, fornecedor: name, motorista: name,
        quantidadeCx: delBlack, cor: 'Preta', valorUnitario: 20.00,
        valorTotal: delBlack * 20.00, status: 'OK', origem: 'motorista', createdAt: TS()
      });
      if (delWhite > 0) batch.set(db.collection('controle_caixas').doc(), {
        tipo: 'SAIDA', data: today, cliente: cn, fornecedor: name, motorista: name,
        quantidadeCx: delWhite, cor: 'Branca', valorUnitario: 28.00,
        valorTotal: delWhite * 28.00, status: 'OK', origem: 'motorista', createdAt: TS()
      });
      if (colBlack > 0) batch.set(db.collection('controle_caixas').doc(), {
        tipo: 'ENTRADA', data: today, cliente: cn, fornecedor: name, motorista: name,
        quantidadeCx: colBlack, cor: 'Preta', valorUnitario: 20.00,
        valorTotal: colBlack * 20.00, status: 'OK', origem: 'motorista', createdAt: TS()
      });
      if (colWhite > 0) batch.set(db.collection('controle_caixas').doc(), {
        tipo: 'ENTRADA', data: today, cliente: cn, fornecedor: name, motorista: name,
        quantidadeCx: colWhite, cor: 'Branca', valorUnitario: 28.00,
        valorTotal: colWhite * 28.00, status: 'OK', origem: 'motorista', createdAt: TS()
      });

      await batch.commit();

      const temFoto = !!(S.fotos.client_entrega || S.fotos.client_coleta);
      S.transactions.push({ clientName: cn, delBlack, delWhite, colBlack, colWhite, temFoto });
      S.truckBlack = newTB; S.truckWhite = newTW;
      S.clientName = '';
      S.delBlack = S.delWhite = S.colBlack = S.colWhite = 0;
      S.fotos.client_entrega = null;
      S.fotos.client_coleta  = null;
      render();
      toast(`✓ ${cn} registrado!`);

    } catch(e) {
      console.error(e);
      toast('Erro ao salvar. Tente novamente.');
      if (btn) { btn.disabled = false; btn.textContent = 'Registrar Cliente'; }
    } finally { S.saving = false; }
  };

  window.goSummary    = function() { S.step = 'summary'; render(); };
  window.backToClient = function() {
    S.clientName = '';
    S.delBlack = S.delWhite = S.colBlack = S.colWhite = 0;
    S.step = 'client'; render();
  };

  window.finalize = async function() {
    if (S.saving) return; S.saving = true;
    const btn = $('finalBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
    try {
      await db.collection('ll_events').add({
        type: 'day_finalized', driverName: name,
        truckBlack: S.truckBlack, truckWhite: S.truckWhite,
        totalClients: S.transactions.length,
        transactions: S.transactions, timestamp: TS()
      });
      S.step = 'done'; render();
    } catch(e) {
      toast('Erro ao finalizar. Tente novamente.');
      if (btn) { btn.disabled = false; btn.textContent = 'Finalizar o Dia'; }
    } finally { S.saving = false; }
  };

  window.newDay = function() {
    Object.assign(S, {
      step: 'choose', mode: null, transactions: [],
      clientName: '', delBlack: 0, delWhite: 0, colBlack: 0, colWhite: 0,
      fotos: {}
    });
    render();
  };
}
</script>
</body>
</html>
