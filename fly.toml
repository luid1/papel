app = "lumin-backend"
primary_region = "gru"

[build]

[env]
  PORT = "3001"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Healthcheck automático: se /health falhar 3x seguidas, Fly.io reinicia a máquina
  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[[mounts]]
  source = "lumin_data"
  destination = "/data"
  initial_size = "1gb"
